<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estoque Inteligente Deck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; min-height: 100vh; background-color: var(--bg-color); margin: 0; }

        :root {
            --bg-color: #FFFFFF; 
            --card-bg: #F9FAFB; 
            --primary: #2e7d32; 
            --text-dark: #1F2937; 
            --text-light: #6B7280; 
            --border: #E5E7EB; 
            --success: #10B981; 
            --delete: #EF4444; 
            --category-bg: #eceff1;
        }

        body { font-family: 'Inter', sans-serif; color: var(--text-dark); display: flex; justify-content: center; padding: 10px; }

        .app-container {
            background: var(--bg-color); width: 100%; max-width: 500px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); display: flex; flex-direction: column;
            border: 1px solid var(--border); margin-bottom: 50px;
        }

        .header { background: var(--bg-color); padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--primary); border-radius: 24px 24px 0 0; }
        .header h1 { font-size: 16px; letter-spacing: 2px; color: var(--primary); margin: 0; }

        #nome-lista-atual {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: var(--text-dark); font-weight: 700; font-size: 16px; padding: 15px 20px; outline: none; text-align: center;
        }

        .section-title { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; padding: 15px 20px 5px; font-weight: 700; }

        .planning-box { padding: 10px 20px 20px; background: var(--bg-color); display: flex; flex-direction: column; gap: 12px; }
        .estoque-lista-container { display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; padding-right: 5px; }

        .category-header {
            background: var(--category-bg); color: var(--text-dark); font-size: 12px;
            font-weight: 800; padding: 8px 15px; border-radius: 8px; margin-top: 15px;
            text-transform: uppercase; display: flex; align-items: center; gap: 8px;
        }

        .item-estoque-row { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); margin-top: 5px; }
        .item-estoque-nome { font-weight: 600; color: var(--text-dark); flex: 1; font-size: 14px; }
        
        .item-estoque-input {
            width: 70px; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            text-align: center; font-size: 15px; outline: none; background: #FFF;
            transition: 0.3s; font-weight: 700;
        }
        .estoque-baixo { color: var(--delete) !important; border-color: var(--delete) !important; background: #fff5f5 !important; }

        .btn-del-padrao { background: none; border: none; color: #CCC; padding: 8px; cursor: pointer; margin-left: 5px; font-size: 14px;}
        
        .add-padrao-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);}
        .add-padrao-row input#novo-item-padrao { flex: 2; min-width: 150px; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--card-bg); }
        .add-padrao-row input#limite-item-padrao { width: 80px; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; text-align: center; background: var(--card-bg); }

        .btn-adicionar { background: var(--primary); color: #FFFFFF; border: none; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; }
        .rodape { padding: 20px; background: var(--bg-color); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .btn-salvar { background: var(--success); color: #FFFFFF; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 10px; }

        .historico-section { padding: 20px; background: var(--card-bg); border-top: 4px solid var(--primary); border-radius: 0 0 24px 24px; }
        .card-historico { background: #FFFFFF; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .hist-acoes { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
        .btn-hist { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-overlay.show { display: flex; }
        .modal { background-color: white; border-radius: 16px; padding: 25px; width: 85%; max-width: 400px; text-align: center; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal.show { display: flex; animation: surge 0.2s ease-out; }
        @keyframes surge { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-footer { display: flex; justify-content: space-around; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; flex-grow: 1; }
        .linha-modal { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .qtd-badge { background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 13px; min-width: 35px; text-align: center;}
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1><i class="fas fa-boxes"></i> ESTOQUE ORGANIZADO</h1>
        </div>
        
        <input type="text" id="nome-lista-atual" placeholder="Título da Conferência">

        <div class="section-title">Controle por Categorias</div>
        <div class="planning-box">
            <div class="estoque-lista-container" id="lista-padroes"></div>
            
            <div class="add-padrao-row">
                <input type="text" id="novo-item-padrao" placeholder="Ex: Tomate, Picanha, Coca...">
                <input type="number" id="limite-item-padrao" placeholder="Min.">
                <button class="btn-adicionar" onclick="addNovoPadrao()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <div class="rodape">
            <button class="btn-salvar" onclick="salvarChecagem()">
                <i class="fas fa-save"></i> Salvar e Limpar
            </button>
        </div>

        <div class="historico-section">
            <div class="section-title" style="padding:0; margin-bottom:15px;"><i class="fas fa-history"></i> Histórico Recente</div>
            <div id="historico-lista"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="fecharTodosModais(event)">
        <div id="modal-alert" class="modal" onclick="event.stopPropagation()">
            <div style="font-weight: bold; margin-bottom: 10px;">⚠️ Atenção</div>
            <div id="modal-alert-body"></div>
            <div class="modal-footer"><button class="modal-btn" style="background: var(--primary); color:white;" onclick="fecharTodosModais()">OK</button></div>
        </div>

        <div id="modal-confirm" class="modal" onclick="event.stopPropagation()">
            <div style="font-weight: bold; color: var(--delete); margin-bottom: 10px;">⚠️ Confirmação</div>
            <div id="modal-confirm-body"></div>
            <div class="modal-footer">
                <button class="modal-btn" style="background:#eee" onclick="fecharTodosModais()">Cancelar</button>
                <button class="modal-btn" style="background:var(--delete); color:white;" onclick="executarAcaoConfirmada()">Confirmar</button>
            </div>
        </div>

        <div id="modal-itens" class="modal" onclick="event.stopPropagation()">
            <h2 id="modal-titulo-lista" style="color: var(--primary); font-size: 16px; margin: 0; font-weight: 800;"></h2>
            <p id="modal-data-lista" style="font-size: 11px; color: var(--text-light); margin-bottom: 10px;"></p>
            <ul id="modal-lista-itens" style="list-style: none; text-align: left; padding: 0; margin: 0;"></ul>
            <button class="modal-btn" style="width: 100%; margin-top: 20px; background:#eee" onclick="fecharTodosModais()">Fechar</button>
        </div>
    </div>

    <script>
        // CATEGORIAS ATUALIZADAS COM HORTIFRÚTI COMPLETO
        const CATEGORIAS_MAP = {
            "BEBIDAS": ["coca", "suco", "cerveja", "agua", "refri", "vinho", "skol", "brahma", "heineken", "lata", "garrafa", "fardo", "gin", "vodka", "tônica", "red bull", "energetico"],
            "CARNES / PROTEÍNAS": ["carne", "picanha", "frango", "linguica", "maminha", "alcatra", "peixe", "porco", "bacon", "costela", "cupim", "coracao", "sobrecoxa", "linguiça"],
            "HORTIFRÚTI": ["alface", "tomate", "cebola", "batata", "limao", "fruta", "legume", "pimentao", "cenoura", "alho", "abobora", "cheiro verde", "salsa", "coentro", "rucula", "couve", "brocolis", "mandioca", "milho", "vagem", "abobrinha"],
            "PROD. LIMPEZA": ["detergente", "sabao", "desinfetante", "agua sanitaria", "limpeza", "esponja", "papel", "pano", "cloro", "alcool", "multiuso", "rodo", "vassoura"],
            "OUTROS": []
        };

        function identificarCategoria(nome) {
            const n = nome.toLowerCase();
            for (let cat in CATEGORIAS_MAP) {
                if (CATEGORIAS_MAP[cat].some(palavra => n.includes(palavra))) {
                    return cat;
                }
            }
            return "OUTROS";
        }

        let historicoEstoque = JSON.parse(localStorage.getItem('historicoEstoquePacheco')) || [];
        let itensPadrao = JSON.parse(localStorage.getItem('itensEstoquePacheco')) || [
            {nome: 'Carvão (Saco)', limite: 5, categoria: 'OUTROS'},
            {nome: 'Picanha (kg)', limite: 10, categoria: 'CARNES / PROTEÍNAS'},
            {nome: 'Tomate', limite: 5, categoria: 'HORTIFRÚTI'}
        ];

        let acaoPendente = null;
        function fecharTodosModais(event) {
            if(event && event.target.id !== 'modal-overlay') return;
            document.getElementById('modal-overlay').classList.remove('show');
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
            acaoPendente = null;
        }

        function abrirAlerta(msg) {
            document.getElementById('modal-alert-body').innerText = msg;
            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('modal-alert').classList.add('show');
        }

        function abrirConfirmacao(msg, acao) {
            document.getElementById('modal-confirm-body').innerText = msg;
            acaoPendente = acao;
            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('modal-confirm').classList.add('show');
        }

        function executarAcaoConfirmada() { if(acaoPendente) acaoPendente(); fecharTodosModais(); }

        function verificarLimite(input, limite, nome) {
            const valor = parseFloat(input.value);
            localStorage.setItem(`draft-${nome}`, input.value); 
            if (!isNaN(valor) && valor <= limite) { input.classList.add('estoque-baixo'); } 
            else { input.classList.remove('estoque-baixo'); }
        }

        function renderizarPadroes() {
            const container = document.getElementById('lista-padroes');
            container.innerHTML = '';
            
            const agrupados = {};
            itensPadrao.forEach((item, index) => {
                if (!agrupados[item.categoria]) agrupados[item.categoria] = [];
                agrupados[item.categoria].push({ ...item, originalIndex: index });
            });

            const ordem = ["BEBIDAS", "CARNES / PROTEÍNAS", "HORTIFRÚTI", "PROD. LIMPEZA", "OUTROS"];

            ordem.forEach(cat => {
                if (agrupados[cat] && agrupados[cat].length > 0) {
                    container.innerHTML += `<div class="category-header"><i class="fas fa-tag"></i> ${cat}</div>`;
                    agrupados[cat].forEach(item => {
                        const draftValue = localStorage.getItem(`draft-${item.nome}`) || '';
                        container.innerHTML += `
                            <div class="item-estoque-row">
                                <span class="item-estoque-nome">${item.nome} <br><small style="color:#999; font-size:9px">Min: ${item.limite}</small></span>
                                <div style="display:flex; align-items:center;">
                                    <input type="number" id="input-${item.originalIndex}" 
                                        class="item-estoque-input" value="${draftValue}"
                                        oninput="verificarLimite(this, ${item.limite}, '${item.nome}')">
                                    <button class="btn-del-padrao" onclick="removerPadrao(${item.originalIndex})"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                        setTimeout(() => {
                            const el = document.getElementById(`input-${item.originalIndex}`);
                            if(el) verificarLimite(el, item.limite, item.nome);
                        }, 50);
                    });
                }
            });
        }

        function addNovoPadrao() {
            const inputNome = document.getElementById('novo-item-padrao');
            const inputLimite = document.getElementById('limite-item-padrao');
            const nome = inputNome.value.trim();
            if (nome) {
                const categoria = identificarCategoria(nome);
                itensPadrao.push({ nome: nome, limite: parseFloat(inputLimite.value) || 0, categoria: categoria });
                localStorage.setItem('itensEstoquePacheco', JSON.stringify(itensPadrao));
                inputNome.value = ''; inputLimite.value = '';
                renderizarPadroes();
            }
        }

        function removerPadrao(index) {
            abrirConfirmacao("Remover este produto?", () => {
                localStorage.removeItem(`draft-${itensPadrao[index].nome}`);
                itensPadrao.splice(index, 1);
                localStorage.setItem('itensEstoquePacheco', JSON.stringify(itensPadrao));
                renderizarPadroes();
            });
        }

        function salvarChecagem() {
            let conferidos = [];
            itensPadrao.forEach((item, i) => {
                let input = document.getElementById(`input-${i}`);
                conferidos.push({
                    nome: item.nome,
                    qtd: input.value.trim() || "-",
                    corBaixa: input.classList.contains('estoque-baixo')
                });
                localStorage.removeItem(`draft-${item.nome}`);
            });

            historicoEstoque.unshift({
                id: Date.now(),
                titulo: document.getElementById('nome-lista-atual').value || "Conferência",
                data: new Date().toLocaleString('pt-BR'),
                itens: conferidos
            });

            localStorage.setItem('historicoEstoquePacheco', JSON.stringify(historicoEstoque));
            location.reload(); 
        }

        function renderizarHistorico() {
            const lista = document.getElementById('historico-lista');
            lista.innerHTML = '';
            historicoEstoque.slice(0, 5).forEach(reg => {
                lista.innerHTML += `
                    <div class="card-historico">
                        <span style="font-weight:700; font-size:14px;">${reg.titulo}</span>
                        <div style="font-size:10px; color:#999;">${reg.data}</div>
                        <div class="hist-acoes">
                            <button class="btn-hist" style="background:var(--card-bg); border:1px solid var(--border);" onclick="verDetalhes(${reg.id})">Ver Relatório</button>
                            <button class="btn-hist" style="color:var(--delete); background:none;" onclick="excluirHistorico(${reg.id})">Apagar</button>
                        </div>
                    </div>
                `;
            });
        }

        function verDetalhes(id) {
            const reg = historicoEstoque.find(h => h.id === id);
            document.getElementById('modal-titulo-lista').innerText = reg.titulo;
            document.getElementById('modal-data-lista').innerText = reg.data;
            const lista = document.getElementById('modal-lista-itens');
            lista.innerHTML = '';
            reg.itens.forEach(it => {
                lista.innerHTML += `
                    <li class="linha-modal">
                        <span style="font-size:14px;">${it.nome}</span>
                        <span class="qtd-badge" style="background:${it.corBaixa ? 'var(--delete)' : 'var(--primary)'}">${it.qtd}</span>
                    </li>
                `;
            });
            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('modal-itens').classList.add('show');
        }

        function excluirHistorico(id) { 
            abrirConfirmacao("Apagar do histórico?", () => {
                historicoEstoque = historicoEstoque.filter(h => h.id !== id);
                localStorage.setItem('historicoEstoquePacheco', JSON.stringify(historicoEstoque));
                renderizarHistorico();
            });
        }

        renderizarPadroes();
        renderizarHistorico();
    </script>
</body>
</html>
