<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teste</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #FFFFFF; 
            --card-bg: #F9FAFB; 
            --primary: #F5A623; 
            --primary-hover: #E59415;
            --text-dark: #1F2937; 
            --text-light: #6B7280; 
            --border: #E5E7EB; 
            --success: #10B981; 
            --delete: #EF4444; 
            --edit: #3B82F6; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CORREÇÃO AQUI: min-height em vez de height trava */
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        /* O container agora cresce livremente para baixo */
        .app-container {
            background: var(--bg-color);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            margin-bottom: 50px;
            height: fit-content;
        }

        .header {
            background: var(--bg-color);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            border-radius: 24px 24px 0 0;
        }

        .total-container { margin-top: 15px; }
        .total-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 2px; }
        .total-value { font-size: 32px; font-weight: 800; color: var(--text-dark); display: block; }

        .section-title {
            font-size: 11px; color: var(--primary); text-transform: uppercase;
            letter-spacing: 1px; padding: 15px 20px 5px; font-weight: 700;
        }

        .planning-box { padding: 10px 20px; background: var(--card-bg); display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--border); }

        textarea {
            width: 100%; height: 80px; background: #FFFFFF; border: 1px solid var(--border);
            border-radius: 12px; color: var(--text-dark); padding: 12px; font-family: 'Inter', sans-serif;
            font-size: 14px; outline: none; resize: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); }

        .btn-importar {
            background: rgba(245, 166, 35, 0.1); color: var(--primary);
            border: 1px solid var(--primary); padding: 12px; border-radius: 10px;
            font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        .input-group {
            padding: 10px 20px 20px; background: var(--bg-color);
            border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;
        }

        .inputs-row { display: flex; gap: 8px; width: 100%; }

        input {
            padding: 14px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 15px; outline: none; background: var(--card-bg); color: var(--text-dark); min-width: 0;
            transition: 0.3s;
        }
        
        input:focus { border-color: var(--primary); background: #FFFFFF; }

        #nome-lista-atual {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: var(--primary); font-weight: 700; font-size: 16px; padding: 10px 20px; outline: none; text-align: center;
        }

        .btn-adicionar {
            background: var(--primary); color: #FFFFFF; border: none;
            padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 800;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-adicionar:hover { background: var(--primary-hover); }

        .btn-adicionar.modo-edicao { background: var(--edit); }

        /* CORREÇÃO AQUI: Lista livre para crescer */
        .lista-compras { list-style: none; padding: 10px 20px; background: #FFFFFF; flex: 1; }

        .item-compra {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 0; border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        .item-compra.editando {
            background: rgba(59, 130, 246, 0.05);
            border-left: 4px solid var(--edit);
            padding-left: 10px;
        }

        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }

        .checkbox-custom {
            width: 26px; height: 26px; min-width: 26px; border: 2px solid var(--border);
            border-radius: 8px; display: flex; justify-content: center; align-items: center;
            color: transparent; background: var(--card-bg); transition: 0.2s;
            flex-shrink: 0;
        }

        .item-compra.comprado .checkbox-custom { background: var(--success); border-color: var(--success); color: #FFFFFF; }
        .item-compra.comprado .checkbox-custom i { display: block; }

        .item-compra.comprado .nome, 
        .item-compra.comprado .detalhes, 
        .item-compra.comprado .subtotal-val {
            text-decoration: line-through; color: var(--text-light);
        }

        /* CORREÇÃO AQUI: Texto quebra linha em vez de sumir */
        .item-textos { display: flex; flex-direction: column; flex: 1; word-break: break-word; }
        .nome { font-size: 16px; font-weight: 600; color: var(--text-dark); }
        .detalhes { font-size: 12px; color: var(--text-light); margin-top: 4px; }

        .acoes-container { display: flex; align-items: center; flex-shrink: 0; gap: 5px; }
        .subtotal-val { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-right: 5px; }

        .btn-acao-item {
            background: none; border: none; font-size: 18px; padding: 8px; cursor: pointer; transition: 0.2s; opacity: 0.7;
        }
        .btn-edit { color: var(--edit); }
        .btn-del { color: var(--text-light); }
        .btn-acao-item:hover { opacity: 1; transform: scale(1.1); }

        .rodape { padding: 20px; background: var(--bg-color); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .btn-salvar {
            background: var(--success); color: #FFFFFF; border: none;
            padding: 15px; border-radius: 12px; font-weight: 800;
            font-size: 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-salvar:hover { opacity: 0.9; }

        .historico-section { padding: 20px; background: var(--card-bg); border-top: 4px solid var(--primary); border-radius: 0 0 24px 24px; }
        .historico-titulo { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .card-historico { background: #FFFFFF; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .hist-nome-lista { color: var(--text-dark); font-size: 15px; font-weight: 700; display: block; margin-bottom: 5px; }
        .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .hist-total { font-size: 16px; font-weight: 800; color: var(--success); }
        .hist-acoes { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .btn-hist { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-view { background: var(--card-bg); color: var(--text-dark); border: 1px solid var(--border); }
        .btn-view:hover { background: #EEEEEE; }
        .btn-del-hist { background: rgba(239, 68, 68, 0.05); color: var(--delete); border: 1px solid rgba(239, 68, 68, 0.1); }

        #modal-itens { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; padding: 20px; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: #FFFFFF; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1 style="font-size: 12px; letter-spacing: 3px; color: var(--text-light);">Compras</h1>
            <div class="total-container">
                <span class="total-label">Subtotal da Compra</span>
                <span class="total-value" id="total-geral">R$ 0,00</span>
            </div>
        </div>
        
        <input type="text" id="nome-lista-atual" placeholder="Título da Lista (Ex: Compras de Quarta)">

        <div class="section-title">1. Planejamento (O que falta?)</div>
        <div class="planning-box">
            <textarea id="rascunho-texto" placeholder="Arroz&#10;Feijão&#10;Carne"></textarea>
            <button class="btn-importar" onclick="importarDoRascunho()">
                <i class="fas fa-magic"></i> Transformar em Checklist
            </button>
        </div>

        <div class="section-title">2. No Mercado (Preços e Pesos)</div>
        <div class="input-group" id="ancora-input">
            <input type="text" id="nome-item" placeholder="Produto">
            <div class="inputs-row">
                <input type="number" id="qtd-item" placeholder="Qtd">
                <input type="number" step="0.01" id="peso-item" placeholder="Kg">
                <input type="number" step="0.01" id="preco-item" placeholder="R$ Uni.">
            </div>
            <button class="btn-adicionar" id="btn-add-main" onclick="adicionarItem()">Adicionar Item</button>
        </div>

        <ul class="lista-compras" id="lista"></ul>

        <div class="rodape">
            <button class="btn-salvar" onclick="salvarListaParaHistorico()">
                <i class="fas fa-check-double"></i> Finalizar e Arquivar
            </button>
        </div>

        <div class="historico-section">
            <div class="historico-titulo"><i class="fas fa-history"></i> Histórico</div>
            <div id="historico-lista"></div>
        </div>
    </div>

    <div id="modal-itens">
        <div class="modal-content">
            <h2 id="modal-titulo-lista" style="color: var(--primary); font-size: 19px; margin-bottom: 20px; font-weight: 700;"></h2>
            <ul id="modal-lista-itens" style="list-style: none;"></ul>
            <button onclick="fecharModal()" style="width: 100%; margin-top: 25px; padding: 14px; background: var(--primary); color: #FFFFFF; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer;">Fechar</button>
        </div>
    </div>

    <script>
        let compras = JSON.parse(localStorage.getItem('comprasPachecoWhiteV2')) || [];
        let historico = JSON.parse(localStorage.getItem('historicoPachecoWhiteV2')) || [];
        let indexSendoEditado = -1;

        function formatarMoeda(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function renderizarLista() {
            const lista = document.getElementById('lista');
            const displayTotal = document.getElementById('total-geral');
            lista.innerHTML = '';
            let total = 0;

            compras.forEach((it, i) => {
                const q = parseFloat(it.qtd) || 1;
                const p = parseFloat(it.peso) || 0;
                const v = parseFloat(it.preco) || 0;
                const sub = p > 0 ? (q * p * v) : (q * v);
                total += sub;
                
                const li = document.createElement('li');
                li.className = `item-compra ${it.comprado ? 'comprado' : ''} ${indexSendoEditado === i ? 'editando' : ''}`;
                const infoPeso = p > 0 ? `${p}kg • ` : '';

                li.innerHTML = `
                    <div class="item-info" onclick="alternarComprado(${i})">
                        <div class="checkbox-custom"><i class="fas fa-check"></i></div>
                        <div class="item-textos">
                            <span class="nome">${it.nome}</span>
                            <span class="detalhes">${it.qtd}x • ${infoPeso}${formatarMoeda(v)}</span>
                        </div>
                    </div>
                    <div class="acoes-container">
                        <span class="subtotal-val">${formatarMoeda(sub)}</span>
                        <button class="btn-acao-item btn-edit" onclick="iniciarEdicao(${i})"><i class="fas fa-pencil-alt"></i></button>
                        <button class="btn-acao-item btn-del" onclick="removerItem(${i})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                lista.appendChild(li);
            });
            displayTotal.textContent = formatarMoeda(total);
            renderizarHistorico();
        }

        function iniciarEdicao(index) {
            indexSendoEditado = index;
            const item = compras[index];
            document.getElementById('nome-item').value = item.nome;
            document.getElementById('qtd-item').value = item.qtd;
            
            document.getElementById('peso-item').value = item.peso > 0 ? item.peso : '';
            document.getElementById('preco-item').value = item.preco > 0 ? item.preco : '';
            
            const btn = document.getElementById('btn-add-main');
            btn.innerText = "Atualizar Item";
            btn.classList.add('modo-edicao');
            document.getElementById('ancora-input').scrollIntoView({ behavior: 'smooth' });
            renderizarLista();
        }

        function adicionarItem() {
            const n = document.getElementById('nome-item');
            const q = document.getElementById('qtd-item');
            const p = document.getElementById('peso-item'); 
            const v = document.getElementById('preco-item');
            
            if (!n.value.trim()) return alert("Digite o nome do produto!");
            
            const dadosItem = { 
                nome: n.value.trim(), 
                qtd: q.value || 1, 
                peso: p.value.replace(',', '.') || "", 
                preco: v.value.replace(',', '.') || 0, 
                comprado: indexSendoEditado !== -1 ? compras[indexSendoEditado].comprado : false 
            };
            
            if (indexSendoEditado !== -1) {
                compras[indexSendoEditado] = dadosItem;
                indexSendoEditado = -1;
                const btn = document.getElementById('btn-add-main');
                btn.innerText = "Adicionar Item";
                btn.classList.remove('modo-edicao');
            } else {
                compras.unshift(dadosItem);
            }
            
            n.value = ''; q.value = ''; p.value = ''; v.value = '';
            salvarDados();
        }

        function importarDoRascunho() {
            const texto = document.getElementById('rascunho-texto').value.trim();
            if (!texto) return;
            
            const itensNovos = texto.split('\n').filter(n => n.trim() !== '');
            
            itensNovos.reverse().forEach(nome => {
                compras.unshift({ nome: nome.trim(), qtd: 1, peso: "", preco: 0, comprado: false });
            });
            
            document.getElementById('rascunho-texto').value = '';
            salvarDados();
        }

        function salvarListaParaHistorico() {
            if (compras.length === 0) return;
            const total = compras.reduce((acc, it) => acc + ((parseFloat(it.peso)||0) > 0 ? (it.qtd*it.peso*it.preco) : (it.qtd*it.preco)), 0);
            historico.unshift({
                id: Date.now(),
                titulo: document.getElementById('nome-lista-atual').value.trim() || "Compra Avulsa",
                data: new Date().toLocaleString('pt-BR'),
                total: total,
                itens: [...compras]
            });
            compras = [];
            document.getElementById('nome-lista-atual').value = '';
            localStorage.setItem('historicoPachecoWhiteV2', JSON.stringify(historico));
            salvarDados();
        }

        function renderizarHistorico() {
            const container = document.getElementById('historico-lista');
            container.innerHTML = '';
            historico.forEach(compra => {
                const div = document.createElement('div');
                div.className = 'card-historico';
                div.innerHTML = `
                    <span class="hist-nome-lista">${compra.titulo}</span>
                    <div class="hist-header">
                        <span style="font-size:10px; color: var(--text-light);">${compra.data}</span>
                        <span class="hist-total">${formatarMoeda(compra.total)}</span>
                    </div>
                    <div class="hist-acoes">
                        <button class="btn-hist btn-view" onclick="verDetalhes(${compra.id})">Ver Itens</button>
                        <button class="btn-hist btn-del-hist" onclick="excluirHistorico(${compra.id})">Apagar</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function verDetalhes(id) {
            const compra = historico.find(h => h.id === id);
            document.getElementById('modal-titulo-lista').innerText = compra.titulo;
            const listaModal = document.getElementById('modal-lista-itens');
            listaModal.innerHTML = '';
            compra.itens.forEach(it => {
                const sub = (parseFloat(it.peso)||0) > 0 ? (it.qtd*it.peso*it.preco) : (it.qtd*it.preco);
                listaModal.innerHTML += `<li style="padding: 12px 0; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                    <span style="color: var(--text-dark); font-size: 14px;">${it.qtd}x ${it.nome} ${it.peso > 0 ? '('+it.peso+'kg)' : ''}</span>
                    <span style="color:var(--primary); font-weight:700; font-size: 14px;">${formatarMoeda(sub)}</span>
                </li>`;
            });
            document.getElementById('modal-itens').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-itens').style.display = 'none'; }
        function removerItem(i) { if(confirm("Remover este item?")) { compras.splice(i, 1); if(indexSendoEditado===i) indexSendoEditado=-1; salvarDados(); } }
        function excluirHistorico(id) { if(confirm("Apagar histórico?")){ historico = historico.filter(h => h.id !== id); localStorage.setItem('historicoPachecoWhiteV2', JSON.stringify(historico)); renderizarHistorico(); } }
        function alternarComprado(i) { compras[i].comprado = !compras[i].comprado; salvarDados(); }
        function salvarDados() { localStorage.setItem('comprasPachecoWhiteV2', JSON.stringify(compras)); renderizarLista(); }

        renderizarLista();
    </script>
</body>
</html>
