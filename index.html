<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checagem de Estoque</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #FFFFFF; 
            --card-bg: #F9FAFB; 
            --primary: #2e7d32; /* Mudei para o Verde da Gerência */
            --primary-hover: #1b5e20;
            --text-dark: #1F2937; 
            --text-light: #6B7280; 
            --border: #E5E7EB; 
            --success: #10B981; 
            --delete: #EF4444; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .app-container {
            background: var(--bg-color);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            margin-bottom: 50px;
        }

        .header {
            background: var(--bg-color);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            border-radius: 24px 24px 0 0;
        }

        .header h1 {
            font-size: 16px; 
            letter-spacing: 2px; 
            color: var(--primary);
            margin: 0;
        }

        #nome-lista-atual {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: var(--text-dark); font-weight: 700; font-size: 16px; padding: 15px 20px; outline: none; text-align: center;
        }
        #nome-lista-atual::placeholder { color: #A0AEC0; font-weight: 400; }

        .section-title {
            font-size: 11px; color: var(--text-light); text-transform: uppercase;
            letter-spacing: 1px; padding: 15px 20px 5px; font-weight: 700;
        }

        .planning-box { 
            padding: 10px 20px 20px; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .estoque-lista-container {
            display: flex; flex-direction: column; gap: 8px;
            max-height: 50vh; /* Permite ver mais itens na tela */
            overflow-y: auto; padding-right: 5px;
        }

        .item-estoque-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border);
        }

        .item-estoque-nome { font-weight: 600; color: var(--text-dark); flex: 1; font-size: 15px; }
        
        .item-estoque-input {
            width: 80px; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            text-align: center; font-size: 15px; outline: none; background: #FFF;
            transition: 0.3s; font-weight: 600;
        }
        .item-estoque-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.2); }

        .btn-del-padrao { background: none; border: none; color: #CCC; padding: 8px; cursor: pointer; margin-left: 5px; transition: 0.2s; font-size: 16px;}
        .btn-del-padrao:hover { color: var(--delete); }

        .add-padrao-row { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);}
        .add-padrao-row input { 
            flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 15px; outline: none; background: var(--card-bg); color: var(--text-dark);
        }
        .add-padrao-row input:focus { border-color: var(--primary); background: #FFF; }

        .btn-adicionar {
            background: var(--primary); color: #FFFFFF; border: none;
            padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }
        .btn-adicionar:active { transform: scale(0.95); }

        .rodape { padding: 20px; background: var(--bg-color); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .btn-salvar {
            background: var(--success); color: #FFFFFF; border: none;
            padding: 16px; border-radius: 12px; font-weight: 800;
            font-size: 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-salvar:active { transform: scale(0.98); }

        /* HISTÓRICO */
        .historico-section { padding: 20px; background: var(--card-bg); border-top: 4px solid var(--primary); border-radius: 0 0 24px 24px; }
        .historico-titulo { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .card-historico { background: #FFFFFF; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .hist-nome-lista { color: var(--text-dark); font-size: 15px; font-weight: 700; display: block; margin-bottom: 5px; }
        .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .hist-acoes { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .btn-hist { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-view { background: var(--card-bg); color: var(--text-dark); border: 1px solid var(--border); }
        .btn-del-hist { background: rgba(239, 68, 68, 0.05); color: var(--delete); border: 1px solid rgba(239, 68, 68, 0.1); }

        /* MODAL */
        #modal-itens { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 20px; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: #FFFFFF; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .linha-modal { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .linha-modal:last-child { border-bottom: none; }
        .qtd-badge { background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 14px; min-width: 40px; text-align: center;}
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1><i class="fas fa-boxes"></i> CONTROLE DE ESTOQUE</h1>
        </div>
        
        <input type="text" id="nome-lista-atual" placeholder="Título (Ex: Conferência Matinal)">

        <div class="section-title">Lista Fixa de Produtos</div>
        <div class="planning-box">
            
            <div class="estoque-lista-container" id="lista-padroes">
                </div>

            <div class="add-padrao-row">
                <input type="text" id="novo-item-padrao" placeholder="Adicionar novo produto ao estoque...">
                <button class="btn-adicionar" onclick="addNovoPadrao()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <div class="rodape">
            <button class="btn-salvar" onclick="salvarChecagem()">
                <i class="fas fa-save"></i> Salvar Checagem
            </button>
        </div>

        <div class="historico-section">
            <div class="historico-titulo"><i class="fas fa-history"></i> Histórico de Checagens</div>
            <div id="historico-lista"></div>
        </div>
    </div>

    <div id="modal-itens">
        <div class="modal-content">
            <h2 id="modal-titulo-lista" style="color: var(--primary); font-size: 18px; margin-bottom: 5px; font-weight: 800;"></h2>
            <p id="modal-data-lista" style="font-size: 12px; color: var(--text-light); margin-bottom: 20px;"></p>
            
            <ul id="modal-lista-itens" style="list-style: none;"></ul>
            
            <button onclick="fecharModal()" style="width: 100%; margin-top: 25px; padding: 15px; background: var(--card-bg); color: var(--text-dark); border: 1px solid var(--border); border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer;">Fechar</button>
        </div>
    </div>

    <script>
        // Banco de dados Local
        let historicoEstoque = JSON.parse(localStorage.getItem('historicoEstoquePacheco')) || [];
        
        // Itens Padrões Iniciais (Pode adicionar ou excluir pelo app)
        let itensPadrao = JSON.parse(localStorage.getItem('itensEstoquePacheco')) || [
            'Arroz (Pacote 5kg)', 
            'Feijão (Pacote 1kg)', 
            'Óleo (Lata)', 
            'Sal Grosso (kg)', 
            'Carvão (Saco)', 
            'Detergente',
            'Embalagem Marmita'
        ];

        // RENDERIZA A LISTA DE ESTOQUE NA TELA
        function renderizarPadroes() {
            const container = document.getElementById('lista-padroes');
            container.innerHTML = '';
            
            if(itensPadrao.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#999; font-size: 14px; padding: 20px;">Nenhum item cadastrado.</p>`;
                return;
            }

            itensPadrao.forEach((item, i) => {
                container.innerHTML += `
                    <div class="item-estoque-row">
                        <span class="item-estoque-nome">${item}</span>
                        <div style="display:flex; align-items:center;">
                            <input type="number" id="qtd-padrao-${i}" class="item-estoque-input" placeholder="Qtd">
                            <button class="btn-del-padrao" onclick="removerPadrao(${i})" title="Remover do sistema"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // ADICIONAR NOVO ITEM FIXO
        function addNovoPadrao() {
            const input = document.getElementById('novo-item-padrao');
            const val = input.value.trim();
            if (val) {
                itensPadrao.push(val);
                localStorage.setItem('itensEstoquePacheco', JSON.stringify(itensPadrao));
                input.value = '';
                renderizarPadroes();
                // Rola para o final da lista para ver o item adicionado
                const container = document.getElementById('lista-padroes');
                container.scrollTop = container.scrollHeight;
            }
        }

        // REMOVER ITEM FIXO
        function removerPadrao(i) {
            if(confirm("Tem certeza que deseja excluir este produto do sistema de estoque?")) {
                itensPadrao.splice(i, 1);
                localStorage.setItem('itensEstoquePacheco', JSON.stringify(itensPadrao));
                renderizarPadroes();
            }
        }

        // SALVAR A CONFERÊNCIA DE HOJE
        function salvarChecagem() {
            if(itensPadrao.length === 0) return alert("Não há itens para checar.");

            let itensConferidos = [];
            let titulo = document.getElementById('nome-lista-atual').value.trim();
            
            // Varre a lista pegando o que foi digitado
            itensPadrao.forEach((item, i) => {
                let input = document.getElementById(`qtd-padrao-${i}`);
                let qtd = input.value.trim();
                
                // Salva na conferência (Se deixou em branco, salva como 0 ou Vazio, aqui optei por salvar o que ele digitou)
                itensConferidos.push({
                    nome: item,
                    qtd: qtd === "" ? "-" : qtd
                });
            });

            // Cria o registro
            let novoRegistro = {
                id: Date.now(),
                titulo: titulo || "Checagem de Rotina",
                data: new Date().toLocaleString('pt-BR'),
                itens: itensConferidos
            };

            // Salva no começo do histórico
            historicoEstoque.unshift(novoRegistro);
            localStorage.setItem('historicoEstoquePacheco', JSON.stringify(historicoEstoque));

            // Limpa a tela para a próxima
            document.getElementById('nome-lista-atual').value = '';
            itensPadrao.forEach((item, i) => {
                document.getElementById(`qtd-padrao-${i}`).value = '';
            });

            renderizarHistorico();
            alert("✅ Checagem de estoque salva com sucesso!");
        }

        // RENDERIZAR O HISTÓRICO
        function renderizarHistorico() {
            const container = document.getElementById('historico-lista');
            container.innerHTML = '';
            
            if(historicoEstoque.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#999; font-size: 14px;">Nenhum histórico registrado.</p>`;
                return;
            }

            historicoEstoque.forEach(registro => {
                const div = document.createElement('div');
                div.className = 'card-historico';
                div.innerHTML = `
                    <span class="hist-nome-lista">${registro.titulo}</span>
                    <div class="hist-header">
                        <span style="font-size:12px; color: var(--text-light);"><i class="far fa-calendar-alt"></i> ${registro.data}</span>
                    </div>
                    <div class="hist-acoes">
                        <button class="btn-hist btn-view" onclick="verDetalhes(${registro.id})"><i class="far fa-eye"></i> Ver Relatório</button>
                        <button class="btn-hist btn-del-hist" onclick="excluirHistorico(${registro.id})"><i class="fas fa-trash"></i> Apagar</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // MODAL DO HISTÓRICO
        function verDetalhes(id) {
            const registro = historicoEstoque.find(h => h.id === id);
            if(!registro) return;

            document.getElementById('modal-titulo-lista').innerText = registro.titulo;
            document.getElementById('modal-data-lista').innerText = "Realizado em: " + registro.data;
            
            const listaModal = document.getElementById('modal-lista-itens');
            listaModal.innerHTML = '';
            
            registro.itens.forEach(it => {
                // Destaca se a quantidade for um traço (não preenchido)
                let corQtd = it.qtd === "-" ? "#ccc" : "var(--text-dark)";
                let bgBadge = it.qtd === "-" ? "#f5f5f5" : "var(--primary)";
                let txtBadge = it.qtd === "-" ? "#999" : "#fff";

                listaModal.innerHTML += `
                    <li class="linha-modal">
                        <span style="color: var(--text-dark); font-size: 15px; font-weight: 600;">${it.nome}</span>
                        <span class="qtd-badge" style="background: ${bgBadge}; color: ${txtBadge};">${it.qtd}</span>
                    </li>
                `;
            });
            document.getElementById('modal-itens').style.display = 'flex';
        }

        function fecharModal() { 
            document.getElementById('modal-itens').style.display = 'none'; 
        }
        
        function excluirHistorico(id) { 
            if(confirm("Tem certeza que deseja apagar este relatório do histórico?")) { 
                historicoEstoque = historicoEstoque.filter(h => h.id !== id); 
                localStorage.setItem('historicoEstoquePacheco', JSON.stringify(historicoEstoque)); 
                renderizarHistorico(); 
            } 
        }

        // Inicia a tela
        renderizarPadroes();
        renderizarHistorico();
    </script>
</body>
</html>
